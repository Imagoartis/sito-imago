<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatti | Imago Artis</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FDFCF8]">
    <nav class="p-4 border-b bg-white sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html"><img src="logo.png" class="h-12 w-auto"></a>
            <a href="index.html" class="text-xs uppercase font-bold tracking-widest text-red-800">← Torna alla Home</a>
        </div>
    </nav>
    <main class="max-w-5xl mx-auto py-20 px-6 grid md:grid-cols-2 gap-16">
        <div>
            <h1 class="text-5xl italic font-serif mb-8">Contattaci</h1>
            <p class="text-stone-600 mb-8">Per ordini, presentazioni o invio manoscritti, siamo a tua disposizione.</p>
            <div class="space-y-4">
                <p><strong>Email:</strong> info@imagoartisedizioni.it</p>
                <p><strong>WhatsApp:</strong> +39 3XX XXXXXXX</p>
                <p><strong>Sede:</strong> Rossano (CS) - Calabria</p>
            </div>
        </div>
        <div class="bg-white p-8 border border-stone-200 shadow-sm">
            <h2 class="text-2xl italic mb-6">Scrivici un messaggio</h2>
            <form class="space-y-4">
                <input type="text" placeholder="Nome" class="w-full p-3 bg-stone-50 border outline-none">
                <input type="email" placeholder="Email" class="w-full p-3 bg-stone-50 border outline-none">
                <textarea placeholder="Messaggio" rows="4" class="w-full p-3 bg-stone-50 border outline-none"></textarea>
                <button class="w-full bg-stone-900 text-white py-4 font-bold uppercase tracking-widest hover:bg-red-800 transition">Invia</button>
            </form>
        </div>
    </main>
</body>
</html>
