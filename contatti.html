<!DOCTYPE html>

    <!-- 1. Questo è il "motore" della grafica, non deve mai mancare -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. I Font ufficiali -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Inter:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root { --bordeaux: #8B1A1A; --crema: #FDFCF8; }
        body { font-family: 'Inter', sans-serif; background-color: var(--crema); color: #1a1a1a; margin:0; }
        h1, h2, h3, .serif { font-family: 'Cormorant Garamond', serif; }
        
        .nav-link { font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; color: #333; transition: 0.3s; }
        .nav-link:hover { color: var(--bordeaux); }
        .group:hover .group-hover\:block { display: block !important; }
    </style>
</head>
<body>

    <!-- NAVIGAZIONE UNIFORME -->
    <nav class="bg-white border-b border-stone-200 sticky top-0 z-[100] h-20 flex items-center shadow-sm">

            </a>
            
            <div class="hidden lg:flex space-x-8 items-center">
                <a href="index.html" class="nav-link">Home</a>
                
                <!-- Menu a Tendina -->
                <div class="relative group">
                    <button class="nav-link flex items-center gap-1 py-4">Le Collane ↓</button>
                    <div class="absolute hidden group-hover:block bg-white border border-stone-100 shadow-xl w-56 p-2 top-full left-0">

                        <a href="index.html#catalogo" class="block px-4 py-3 text-[11px] font-bold uppercase tracking-widest text-stone-600 hover:text-red-800 hover:bg-stone-50 border-t">Narrativa e Saggistica</a>
                    </div>
                </div>

                <a href="autori.html" class="nav-link text-red-800">Manoscritti</a>

                <p><strong>Email:</strong> info@imagoartisedizioni.it</p>
                <p><strong>WhatsApp:</strong> +39 3XX XXXXXXX</p>
                <p><strong>Sede:</strong> Rossano (CS) - Calabria</p>
            </div>
        </div>
        <div class="bg-white p-8 border border-stone-200 shadow-sm">
            <h2 class="text-2xl italic mb-6">Scrivici un messaggio</h2>
            <form class="space-y-4">
                <input type="text" placeholder="Nome" class="w-full p-3 bg-stone-50 border outline-none">
                <input type="email" placeholder="Email" class="w-full p-3 bg-stone-50 border outline-none">
                <textarea placeholder="Messaggio" rows="4" class="w-full p-3 bg-stone-50 border outline-none"></textarea>
                <button class="w-full bg-stone-900 text-white py-4 font-bold uppercase tracking-widest hover:bg-red-800 transition">Invia</button>
            </form>
        </div>
