<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imago Artis Edizioni | Cultura e Memoria</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bordeaux: #8B1A1A; --oro: #C5A059; --crema: #FDFCF8; }
        body { font-family: 'Inter', sans-serif; background-color: var(--crema); color: #1a1a1a; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); }
        h1, h2, h3, h4, .serif { font-family: 'Cormorant Garamond', serif; }
        
        .nav-link { font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; transition: 0.3s; color: #444; }
        .nav-link:hover { color: var(--bordeaux); }

        .video-container { position: relative; height: 80vh; width: 100%; overflow: hidden; background: #000; }
        video { object-fit: cover; width: 100%; height: 100%; position: absolute; opacity: 0.6; }
        .hero-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; text-align: center; color: white; flex-direction: column; padding: 20px; z-index: 10; }

        .book-card { background: white; transition: 0.4s; border: 1px solid rgba(0,0,0,0.05); height: 100%; display: flex; flex-direction: column; }
        .book-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .book-img { aspect-ratio: 2/3; width: 100%; object-fit: cover; margin-bottom: 15px; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
