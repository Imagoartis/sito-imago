<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imago Artis Edizioni | Eccellenza Editoriale</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bordeaux: #8B1A1A; --oro: #C5A059; --crema: #FDFCF8; }
        body { font-family: 'Inter', sans-serif; background-color: var(--crema); color: #1a1a1a; margin:0; }
        h1, h2, h3, h4, .serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Navigazione e Tendina */
        .nav-link { font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; color: #444; transition: 0.3s; }
        .nav-link:hover { color: var(--bordeaux); }
        
        .dropdown:hover .dropdown-menu { display: block; }
        .dropdown-menu { display: none; position: absolute; background-color: white; border: 1px solid #eee; min-width: 220px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); z-index: 100; margin-top: 0; padding: 10px 0; }
        .dropdown-item { padding: 10px 20px; display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #666; transition: 0.3s; }
        .dropdown-item:hover { background-color: #f9f9f9; color: var(--bordeaux); }

        /* Video Header - LUMINOSO */
        .video-container { position: relative; height: 80vh; width: 100%; overflow: hidden; background: #000; }
        video { object-fit: cover; width: 100%; height: 100%; position: absolute; opacity: 0.75; z-index: 1; } 
        .hero-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; text-align: center; color: white; flex-direction: column; padding: 20px; z-index: 10; background: rgba(0,0,0,0.3); } 

        /* Cards Libri */
        .book-card { background: white; transition: 0.4s; border: 1px solid #eee; padding: 20px; display: flex; flex-direction: column; height: 100%; }
        .book-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .book-img { aspect-ratio: 2/3; width: 100%; object-fit: cover; margin-bottom: 20px; box-shadow: 5px 5px 20px rgba(0,0,0,0.1); border: 1px solid #f0f0f0; }
        
        .codex-highlight { background-color: #f9f7f2; border-top: 1px solid #e5e0d5; border-bottom: 1px solid #e5e0d5; }
    </style>
</head>
